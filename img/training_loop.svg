<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 235" font-family="sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
    <marker id="arr-up" markerWidth="8" markerHeight="8" refX="3" refY="1" orient="auto">
      <path d="M0,0 L6,0 L3,8 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="235" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">The training loop — one mini-batch step</text>

  <!-- ── Box 1: Mini-batch ── -->
  <rect x="15" y="50" width="108" height="58" rx="8" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="69" y="71" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980b9">Mini-batch</text>
  <text x="69" y="86" text-anchor="middle" font-size="9" fill="#555">random sample</text>
  <text x="69" y="98" text-anchor="middle" font-size="9" fill="#555">of training data</text>

  <!-- Arrow 1 -->
  <line x1="124" y1="79" x2="151" y2="79" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Box 2: Forward pass ── -->
  <rect x="153" y="50" width="112" height="58" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="209" y="71" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">Forward pass</text>
  <text x="209" y="86" text-anchor="middle" font-size="9" fill="#555">model computes</text>
  <text x="209" y="98" text-anchor="middle" font-size="9" fill="#555">predictions</text>

  <!-- Arrow 2 -->
  <line x1="266" y1="79" x2="293" y2="79" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Box 3: Loss ── -->
  <rect x="295" y="50" width="90" height="58" rx="8" fill="#fdebd0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="340" y="71" text-anchor="middle" font-size="11" font-weight="bold" fill="#e67e22">Loss  ℒ</text>
  <text x="340" y="86" text-anchor="middle" font-size="9" fill="#555">how wrong are</text>
  <text x="340" y="98" text-anchor="middle" font-size="9" fill="#555">the predictions?</text>

  <!-- Arrow 3 -->
  <line x1="386" y1="79" x2="413" y2="79" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Box 4: Backprop ── -->
  <rect x="415" y="50" width="108" height="58" rx="8" fill="#e8daef" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="469" y="71" text-anchor="middle" font-size="11" font-weight="bold" fill="#8e44ad">Backprop</text>
  <text x="469" y="86" text-anchor="middle" font-size="9" fill="#555">compute gradients</text>
  <text x="469" y="98" text-anchor="middle" font-size="9" fill="#555">&#x2202;&#x2112; / &#x2202;w</text>

  <!-- Arrow 4 -->
  <line x1="524" y1="79" x2="551" y2="79" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Box 5: Weight update ── -->
  <rect x="553" y="50" width="112" height="58" rx="8" fill="#d1f2eb" stroke="#1abc9c" stroke-width="1.5"/>
  <text x="609" y="71" text-anchor="middle" font-size="11" font-weight="bold" fill="#1abc9c">Weight update</text>
  <text x="609" y="86" text-anchor="middle" font-size="9" fill="#555">SGD step:</text>
  <text x="609" y="98" text-anchor="middle" font-size="9" fill="#555">w &#x2190; w &#x2212; lr&#xB7;&#x2202;&#x2112;/&#x2202;w</text>

  <!-- ── Return arrow (bottom loop) ── -->
  <!-- Down from box5 bottom -->
  <line x1="609" y1="109" x2="609" y2="155" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Across bottom -->
  <line x1="609" y1="155" x2="69"  y2="155" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Up into box1 bottom (arrowhead pointing up) -->
  <line x1="69"  y1="155" x2="69"  y2="112" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Return label -->
  <text x="340" y="148" text-anchor="middle" font-size="10" fill="#888" font-style="italic">next mini-batch → repeat</text>

  <!-- ── Epoch note ── -->
  <rect x="15" y="170" width="650" height="26" rx="6" fill="#eaf0fb" stroke="#aab7e8" stroke-width="1"/>
  <text x="340" y="187" text-anchor="middle" font-size="10" fill="#444">
    <tspan font-weight="bold">Epoch:</tspan>
    <tspan> one full pass through the entire training set (many mini-batch steps). Training runs for </tspan>
    <tspan font-style="italic">num_epochs</tspan>
    <tspan> epochs.</tspan>
  </text>

  <!-- ── Loss curve inset ── -->
  <rect x="15" y="200" width="650" height="26" rx="6" fill="#fef9f0" stroke="#f0c080" stroke-width="1"/>
  <text x="340" y="217" text-anchor="middle" font-size="10" fill="#444">
    <tspan font-weight="bold">Early stopping:</tspan>
    <tspan> if the loss stops improving on validation data for </tspan>
    <tspan font-style="italic">patience</tspan>
    <tspan> epochs, training halts to avoid overfitting.</tspan>
  </text>
</svg>
