<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 200" font-family="sans-serif">
  <!-- Background -->
  <rect width="620" height="200" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="310" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">From raw text to a dense vector</text>

  <!-- Step 1: Raw word -->
  <rect x="20" y="55" width="90" height="44" rx="8" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="65" y="73" text-anchor="middle" font-size="11" fill="#555">raw text</text>
  <text x="65" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#2980b9">"cat"</text>

  <!-- Arrow 1 -->
  <line x1="112" y1="77" x2="148" y2="77" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="130" y="70" text-anchor="middle" font-size="9" fill="#888">tokenize</text>

  <!-- Step 2: Token ID -->
  <rect x="150" y="55" width="100" height="44" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="200" y="73" text-anchor="middle" font-size="11" fill="#555">token ID</text>
  <text x="200" y="91" text-anchor="middle" font-size="16" font-weight="bold" fill="#27ae60">2345</text>

  <!-- Arrow 2 -->
  <line x1="252" y1="77" x2="288" y2="77" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="270" y="65" text-anchor="middle" font-size="9" fill="#888">lookup</text>
  <text x="270" y="75" text-anchor="middle" font-size="9" fill="#888">table</text>

  <!-- Step 3: Dense vector -->
  <rect x="290" y="40" width="210" height="74" rx="8" fill="#fef9e7" stroke="#d4ac0d" stroke-width="1.5"/>
  <text x="395" y="60" text-anchor="middle" font-size="11" fill="#555">dense embedding vector  (e.g. 768 dims)</text>
  <!-- Mini vector bars -->
  <rect x="302" y="68" width="12" height="32" rx="2" fill="#f1c40f" opacity="0.8"/>
  <rect x="318" y="78" width="12" height="22" rx="2" fill="#e67e22" opacity="0.8"/>
  <rect x="334" y="60" width="12" height="40" rx="2" fill="#f1c40f" opacity="0.8"/>
  <rect x="350" y="72" width="12" height="28" rx="2" fill="#e67e22" opacity="0.8"/>
  <rect x="366" y="82" width="12" height="18" rx="2" fill="#f1c40f" opacity="0.8"/>
  <rect x="382" y="64" width="12" height="36" rx="2" fill="#e67e22" opacity="0.8"/>
  <rect x="398" y="76" width="12" height="24" rx="2" fill="#f1c40f" opacity="0.8"/>
  <rect x="414" y="68" width="12" height="32" rx="2" fill="#e67e22" opacity="0.8"/>
  <rect x="430" y="62" width="12" height="38" rx="2" fill="#f1c40f" opacity="0.8"/>
  <rect x="446" y="74" width="12" height="26" rx="2" fill="#e67e22" opacity="0.8"/>
  <text x="472" y="89" text-anchor="start" font-size="13" fill="#999">···</text>

  <!-- Arrow 3 -->
  <line x1="502" y1="77" x2="538" y2="77" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="520" y="65" text-anchor="middle" font-size="9" fill="#888">model</text>
  <text x="520" y="75" text-anchor="middle" font-size="9" fill="#888">uses</text>

  <!-- Step 4: Model / meaning -->
  <rect x="540" y="55" width="68" height="44" rx="8" fill="#f9ebea" stroke="#c0392b" stroke-width="1.5"/>
  <text x="574" y="71" text-anchor="middle" font-size="10" fill="#555">semantic</text>
  <text x="574" y="84" text-anchor="middle" font-size="10" fill="#555">meaning</text>
  <text x="574" y="97" text-anchor="middle" font-size="10" fill="#c0392b">🐱</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#999"/>
    </marker>
  </defs>

  <!-- Key insight -->
  <text x="310" y="145" text-anchor="middle" font-size="11" fill="#555">Each word becomes a list of ~768 numbers — its "coordinates" in semantic space.</text>
  <text x="310" y="165" text-anchor="middle" font-size="11" fill="#555">These numbers are <tspan font-weight="bold">learned</tspan> during training so that similar words get similar vectors.</text>
  <text x="310" y="185" text-anchor="middle" font-size="11" fill="#888" font-style="italic">A one-hot vector says "word #2345 exists". An embedding says "what the word means".</text>
</svg>
