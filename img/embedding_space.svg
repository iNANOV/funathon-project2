<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" font-family="sans-serif">
  <!-- Background -->
  <rect width="560" height="420" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="280" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Words projected into a 2D embedding space</text>
  <text x="280" y="46" text-anchor="middle" font-size="11" fill="#666">(in reality, embeddings have hundreds of dimensions)</text>

  <!-- Axes -->
  <line x1="60" y1="380" x2="520" y2="380" stroke="#999" stroke-width="1.5"/>
  <line x1="60" y1="380" x2="60" y2="65" stroke="#999" stroke-width="1.5"/>
  <!-- Axis arrows -->
  <polygon points="520,376 528,380 520,384" fill="#999"/>
  <polygon points="56,65 60,57 64,65" fill="#999"/>
  <text x="530" y="384" font-size="11" fill="#888">dim 1</text>
  <text x="38" y="62" font-size="11" fill="#888" text-anchor="end">dim 2</text>

  <!-- Cluster: Animals (top-left) -->
  <ellipse cx="145" cy="120" rx="72" ry="50" fill="#e8f4fd" stroke="#a8d4f5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="145" y="85" text-anchor="middle" font-size="10" fill="#4a90d9" font-style="italic">animals</text>
  <!-- Words -->
  <circle cx="110" cy="105" r="4" fill="#2980b9"/>
  <text x="110" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">cat</text>
  <circle cx="175" cy="115" r="4" fill="#2980b9"/>
  <text x="175" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">dog</text>
  <circle cx="130" cy="145" r="4" fill="#2980b9"/>
  <text x="130" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">kitten</text>
  <circle cx="168" cy="148" r="4" fill="#2980b9"/>
  <text x="175" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">puppy</text>

  <!-- Cluster: Royalty (top-right) -->
  <ellipse cx="400" cy="130" rx="70" ry="52" fill="#fef9e7" stroke="#f7dc6f" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="400" y="90" text-anchor="middle" font-size="10" fill="#b7950b" font-style="italic">royalty</text>
  <circle cx="365" cy="120" r="4" fill="#d4ac0d"/>
  <text x="357" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="#d4ac0d">king</text>
  <circle cx="420" cy="115" r="4" fill="#d4ac0d"/>
  <text x="435" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="#d4ac0d">queen</text>
  <circle cx="380" cy="150" r="4" fill="#d4ac0d"/>
  <text x="375" y="168" text-anchor="middle" font-size="12" font-weight="bold" fill="#d4ac0d">prince</text>
  <circle cx="430" cy="148" r="4" fill="#d4ac0d"/>
  <text x="435" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="#d4ac0d">princess</text>

  <!-- Cluster: Cities/Countries (bottom-right) -->
  <ellipse cx="405" cy="300" rx="75" ry="52" fill="#eafaf1" stroke="#82e0aa" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="405" y="262" text-anchor="middle" font-size="10" fill="#1e8449" font-style="italic">cities &amp; countries</text>
  <circle cx="370" cy="285" r="4" fill="#1e8449"/>
  <text x="362" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e8449">Paris</text>
  <circle cx="430" cy="285" r="4" fill="#1e8449"/>
  <text x="440" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e8449">London</text>
  <circle cx="370" cy="320" r="4" fill="#1e8449"/>
  <text x="360" y="338" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e8449">France</text>
  <circle cx="430" cy="320" r="4" fill="#1e8449"/>
  <text x="444" y="338" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e8449">England</text>

  <!-- Cluster: Food (bottom-left) -->
  <ellipse cx="155" cy="300" rx="72" ry="50" fill="#fdf2f8" stroke="#d7bde2" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="155" y="262" text-anchor="middle" font-size="10" fill="#7d3c98" font-style="italic">food</text>
  <circle cx="120" cy="285" r="4" fill="#7d3c98"/>
  <text x="113" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="#7d3c98">pizza</text>
  <circle cx="185" cy="285" r="4" fill="#7d3c98"/>
  <text x="195" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="#7d3c98">pasta</text>
  <circle cx="120" cy="320" r="4" fill="#7d3c98"/>
  <text x="113" y="337" text-anchor="middle" font-size="12" font-weight="bold" fill="#7d3c98">bread</text>
  <circle cx="185" cy="318" r="4" fill="#7d3c98"/>
  <text x="196" y="335" text-anchor="middle" font-size="12" font-weight="bold" fill="#7d3c98">soup</text>

  <!-- Key insight label: similar words are close -->
  <text x="280" y="400" text-anchor="middle" font-size="11" fill="#555" font-style="italic">Similar words end up close together — the model learns this from data.</text>
</svg>
